CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_GPIO=y
CONFIG_LED=y

CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SENSOR=y
CONFIG_SHT3XD=y
CONFIG_BME280=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MTD=y
CONFIG_SPI_NOR=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS=y

CONFIG_WATCHDOG=y

CONFIG_ASSERT=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_TIMESLICING=y

# Optional: if you later implement hardware-timer callbacks
# CONFIG_COUNTER=y
# CONFIG_COUNTER_STM32_TMR=y
